<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books Management SPA</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📚 Books Manager (API + JS Architecture)</h2>
            <button class="btn btn-primary" onclick="showForm()">+ Add New Book</button>
        </div>

        <div id="bookFormContainer" class="card shadow-sm mb-4 d-none" style="max-width: 500px;">
            <div class="card-body">
                <h5 id="formTitle">Add Book</h5>
                <input type="hidden" id="bookId">
                <div class="mb-2"><input type="text" id="title" class="form-control" placeholder="Title"></div>
                <div class="mb-2"><textarea id="synopsis" class="form-control" placeholder="Synopsis"></textarea></div>
                <div class="mb-2"><input type="number" id="pages" class="form-control" placeholder="Pages"></div>
                <div class="mb-2"><input type="date" id="publication_date" class="form-control"></div>
                <button class="btn btn-success btn-sm" onclick="saveBook()">Save</button>
                <button class="btn btn-secondary btn-sm" onclick="hideForm()">Cancel</button>
            </div>
        </div>

        <table class="table table-striped bg-white shadow-sm">
            <thead class="table-dark">
                <tr><th>ID</th><th>Title</th><th>Synopsis</th><th>Pages</th><th>Published</th><th>Actions</th></tr>
            </thead>
            <tbody id="booksTableBody">
                </tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
